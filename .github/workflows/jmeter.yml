name: QA Performance - JMeter Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Tipo de teste'
        required: true
        default: 'load'
        type: choice
        options:
          - load
          - spike
          - both

jobs:
  performance-test:
    name: JMeter Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Apache JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Criar pastas de resultados
        run: mkdir -p results reports/load-test reports/spike-test

      - name: Executar Load Test
        if: ${{ github.event.inputs.test_type == 'load' || github.event.inputs.test_type == 'both' || github.event_name == 'push' }}
        run: |
          jmeter -n \
            -t scripts/load-test.jmx \
            -l results/load-test-results.jtl \
            -e -o reports/load-test

      - name: Executar Spike Test
        if: ${{ github.event.inputs.test_type == 'spike' || github.event.inputs.test_type == 'both' }}
        run: |
          jmeter -n \
            -t scripts/spike-test.jmx \
            -l results/spike-test-results.jtl \
            -e -o reports/spike-test

      - name: Upload relatório Load Test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-load-test-report
          path: reports/load-test/
          retention-days: 30

      - name: Upload relatório Spike Test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-spike-test-report
          path: reports/spike-test/
          retention-days: 30

      - name: Upload arquivos JTL
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-jtl-results
          path: results/
          retention-days: 30
