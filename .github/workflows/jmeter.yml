name: QA Performance - JMeter Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  performance-test:
    name: JMeter Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Apache JMeter 5.6.3
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Criar pastas de resultados
        run: mkdir -p results reports/load-test

      - name: Executar Load Test
        run: |
          jmeter -n \
            -t scripts/load-test.jmx \
            -l results/load-test-results.jtl \
            -e -o reports/load-test

      - name: Upload relatório (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-load-test-report
          path: reports/load-test/
          retention-days: 30

      - name: Upload arquivo JTL (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-jtl-results
          path: results/load-test-results.jtl
          retention-days: 30

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/load-test
          publish_branch: gh-pages
          commit_message: "ci: atualiza relatório JMeter - run #${{ github.run_number }}"
